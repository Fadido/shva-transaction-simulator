services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: shva-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_pass1!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Your_strong_pass1!' -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  server:
    build: ./server
    container_name: shva-server
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__Default: "Server=mssql,1433;Database=ShvaSimulator;User Id=sa;Password=Your_strong_pass1!;TrustServerCertificate=True;Encrypt=False"
      Jwt__Key: "compose-only-shva-jwt-signing-key-please-change-32+chars"
      Jwt__Issuer: "shva-api"
      Jwt__Audience: "shva-client"
      Cors__ClientOrigin: "http://localhost:3000"
    ports:
      - "5000:8080"
    depends_on:
      mssql:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: "/api"
    container_name: shva-client
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  mssql-data:
